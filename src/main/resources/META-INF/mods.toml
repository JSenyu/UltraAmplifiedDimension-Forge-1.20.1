modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/JSenyu/UltraAmplifiedDimension-Forge-1.20.1/issues"
displayURL="https://github.com/JSenyu/UltraAmplifiedDimension-Forge-1.20.1"
credits="${mod_credits}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="ultraamplifiedbanner.png"
logoBlur=false
authors="${mod_authors}"
