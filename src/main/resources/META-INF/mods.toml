modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
displayURL="https://www.curseforge.com/minecraft/mc-mods/ultra-amplified-mod"
credits="Special thanks to all the Forge tutorials and debugging help from other modders!"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="ultraamplifiedbanner.png"
logoBlur=false
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
